<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Veritime{% endblock %} — School Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>

  <!-- Navigation -->
  <nav class="neu-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-container">
      <a href="/" class="nav-brand" aria-label="Veritime home">
        <div class="brand-icon" aria-hidden="true">V</div>
        <span class="brand-name">Veritime</span>
      </a>

      <div class="nav-links" id="nav-links">
        <a href="/"         class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/students" class="nav-link {% if active_page == 'students' %}active{% endif %}">Students</a>
        <a href="/logs"     class="nav-link {% if active_page == 'logs' %}active{% endif %}">Logs</a>
      </div>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-menu">
        <span class="ham-icon" id="ham-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="3" y1="6"  x2="19" y2="6"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="3" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="3" y1="16" x2="19" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
      </button>
    </div>

    <div class="mobile-menu" id="mobile-menu" hidden>
      <a href="/"         class="mobile-link {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/students" class="mobile-link {% if active_page == 'students' %}active{% endif %}">Students</a>
      <a href="/logs"     class="mobile-link {% if active_page == 'logs' %}active{% endif %}">Logs</a>
    </div>
  </nav>

  <main class="page-main">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Mobile nav toggle
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger.addEventListener('click', () => {
      const open = !mobileMenu.hidden;
      mobileMenu.hidden = open;
      hamburger.setAttribute('aria-expanded', String(!open));
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
