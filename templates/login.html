<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Veritime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      background: #0B0B0B;
      color: #F0EDE6;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: #F5C400;
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-family: 'DM Serif Display', serif;
      font-weight: 800;
      font-size: 1.05rem;
      color: #000;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.825rem;
      color: rgba(240,237,230,0.45);
      margin-bottom: 1.75rem;
    }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.825rem;
      color: #f87171;
      margin-bottom: 1.25rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.775rem;
      font-weight: 600;
      color: rgba(240,237,230,0.55);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: #1B1B1B;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px;
      color: #F0EDE6;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #F5C400; }
    input::placeholder { color: rgba(240,237,230,0.25); }

    button[type="submit"] {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.75rem;
      background: #F5C400;
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    button[type="submit"]:hover { background: #FFD740; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: rgba(240,237,230,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(240,237,230,0.65); }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">V</div>
    <span class="brand-name">Veritime</span>
  </div>

  <h1>Admin Sign In</h1>
  <p class="subtitle">St. Catherine's College Attendance System</p>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login" novalidate>
    <div class="field">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Enter username"
        autocomplete="username"
        required
        autofocus
      />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter password"
        autocomplete="current-password"
        required
      />
    </div>
    <button type="submit">Sign In</button>
  </form>

  <a href="/landing" class="back-link">← Back to landing page</a>
</div>

</body>
</html>
